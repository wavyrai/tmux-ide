name: new-name
orchestrator:
  enabled: true
  master_pane: Master
  auto_dispatch: false
  stall_timeout: 300000
  poll_interval: 5000
  worktree_root: .worktrees/
rows:
  - size: 70%
    panes:
      - title: Editor
        command: claude --dangerously-skip-permissions
        focus: true
        size: 40%
      - title: Tests
        command: pnpm test
        size: 30%
      - title: Wide
        size: 30%
  - size: 30%
    panes:
      - title: Mission Control
        type: mission-control
        size: 40%
      - title: Explorer
        type: explorer
        size: 30%
      - title: Preview
        type: preview
        size: 30%
