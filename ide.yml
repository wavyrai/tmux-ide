name: tmux-ide

orchestrator:
  enabled: true
  master_pane: Master
  auto_dispatch: true
  stall_timeout: 300000
  poll_interval: 5000
  worktree_root: .worktrees/

team:
  name: tmux-ide

rows:
  - size: 70%
    panes:
      - title: Master
        command: claude
        role: lead
        focus: true
        size: 40%
      - title: Agent 1
        command: claude --dangerously-skip-permissions
        role: teammate
        size: 30%
      - title: Agent 2
        command: claude --dangerously-skip-permissions
        role: teammate
        size: 30%
  - size: 30%
    panes:
      - title: War Room
        type: warroom
        size: 25%
      - title: Tasks
        type: tasks
        size: 25%
      - title: Explorer
        type: explorer
        size: 25%
        target: Preview
      - title: Preview
        type: preview
        size: 25%
