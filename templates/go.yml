name: my-app
version: 1

before: go mod download

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-1
          title: Claude 1 — feature
          command: claude
        - id: agent-2
          title: Claude 2 — review
          command: claude

    - panes:
