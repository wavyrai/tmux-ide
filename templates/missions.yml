name: project-name
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-lead
          title: Lead
          command: claude
          focus: true
        - id: agent-frontend
          title: Frontend
          command: claude
        - id: agent-backend
          title: Backend
          command: claude

    - size: 30%
      panes:
        - id: agent-validator
          title: Validator
          command: claude
        - id: agent-researcher
          title: Researcher
          command: claude
        - id: shell
          title: Shell
