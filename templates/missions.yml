name: project-name
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

terminal:
  rows:
    - size: 70%
      panes:
        - title: Lead
          command: claude
          focus: true
        - title: Frontend
          command: claude
        - title: Backend
          command: claude

    - size: 30%
      panes:
        - title: Validator
          command: claude
        - title: Researcher
          command: claude
        - title: Shell
