name: my-app
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

before: pnpm install

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-lead
          title: Lead
          command: claude
          focus: true
        - id: agent-frontend
          title: Frontend
          command: claude
        - id: agent-backend
          title: Backend
          command: claude

    - panes:
        - id: dev
          title: Next.js
          command: pnpm dev
        - id: changes
          title: Changes
          type: changes # live git changes widget
        - id: shell
          title: Shell
