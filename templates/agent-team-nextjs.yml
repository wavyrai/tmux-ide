name: my-app
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

before: pnpm install

terminal:
  rows:
    - size: 70%
      panes:
        - title: Lead
          command: claude
          focus: true
        - title: Frontend
          command: claude
        - title: Backend
          command: claude

    - panes:
        - title: Next.js
          command: pnpm dev
        - title: Changes
          type: changes # live git changes widget
        - title: Shell
