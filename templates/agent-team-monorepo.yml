name: my-monorepo
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

before: pnpm install

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-lead
          title: Lead — Architect
          command: claude
          focus: true
        - id: agent-frontend
          title: Frontend Agent
          command: claude
          dir: apps/web
        - id: agent-backend
          title: Backend Agent
          command: claude
          dir: apps/api

    - panes:
        - id: dev-frontend
          title: Frontend
          command: pnpm dev
          dir: apps/web
        - id: dev-backend
          title: Backend
          command: pnpm dev
          dir: apps/api
        - id: shell
          title: Shell
