name: my-project
version: 1

# Ground-truth agent status (working/blocked/done glyphs on the fleet tabs)
# comes from Claude Code's lifecycle hooks. Wire them once with:
#   tmux-ide integration install claude

# before: npm install

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-lead
          title: Lead
          command: claude
          focus: true
        - id: agent-1
          title: Teammate 1
          command: claude
        - id: agent-2
          title: Teammate 2
          command: claude

    - panes:
        - id: changes
          title: Changes
          type: changes # live git changes widget
        - id: dev
          title: Dev Server
          # command: npm run dev
        - id: shell
          title: Shell
