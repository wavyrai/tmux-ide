name: my-app
version: 1

before: pnpm install

terminal:
  rows:
    - size: 70%
      panes:
        - id: agent-1
          title: Claude 1 — feature
          command: claude
        - id: agent-2
          title: Claude 2 — review
          command: claude
        - id: agent-3
          title: Claude 3 — explore
          command: claude

    - panes:
        - id: dev
          title: Next.js
          command: pnpm dev
        - id: convex
          title: Convex
          command: npx convex dev
        - id: shell
          title: Shell
          focus: true
