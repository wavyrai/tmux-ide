name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cli:
    name: CLI checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:workspace

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm build

      # Tests require --experimental-strip-types (Node >= 22.6)
      - name: Run test suite
        if: matrix.node >= 22
        run: pnpm test:unit

      - name: Smoke test (Node < 22 — no --experimental-strip-types)
        if: matrix.node < 22
        run: node bin/cli.js --help && node bin/cli.js --version

      - name: Validate package contents
        run: pnpm pack:check

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (dashboard may depend on dist/)
        run: pnpm build

      - name: Build dashboard
        working-directory: dashboard
        run: npx next build

      - name: Run dashboard tests
        run: cd dashboard && pnpm test

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
