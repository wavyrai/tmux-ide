name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  native_macos_notifier:
    name: Native macOS notifier
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 24

      - name: Build and verify universal adaptive app
        run: node scripts/build-macos-notifier.mjs --output "$RUNNER_TEMP/TmuxIdeNotifier.app" --version 0.0.0

  cli:
    name: CLI checks (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:workspace

      - name: Format check
        run: pnpm run format:check

      - name: Build
        run: pnpm build

      # test:unit is scoped to src/cli.test.ts only (integration.test.ts
      # needs a real tmux session and is excluded by path).
      - name: Run test suite
        if: matrix.node >= 22
        run: pnpm test:unit

      - name: Run canonical daemon and authentication suites
        if: matrix.node >= 22
        run: pnpm test:daemon-bun

      - name: Run TUI renderer suite
        if: matrix.node >= 22
        run: pnpm test:tui-renderer

      - name: Validate package contents
        run: pnpm pack:check

      - name: Install tarball and smoke canonical headless ownership
        if: matrix.node >= 22
        run: pnpm test:pack-installed

  coverage:
    name: Vitest coverage (per package)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (workspace deps may need dist/)
        run: pnpm build

      # Each call enforces that package's `coverage.thresholds` — a
      # regression below the floor fails the step. `continue-on-error`
      # is intentionally off; the floors are pinned just below current
      # numbers so a green main stays green.
      - name: Coverage — daemon
        working-directory: packages/daemon
        run: pnpm exec vitest run --coverage

      - name: Summarize coverage for PR
        if: always()
        run: node scripts/coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-html
          path: |
            packages/daemon/coverage
          if-no-files-found: ignore
          retention-days: 14

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
