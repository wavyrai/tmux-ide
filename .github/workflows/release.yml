name: Release

# Single source of truth for npm releases. Triggered by a semver tag
# push (`vX.Y.Z`) or a manual `workflow_dispatch` with an explicit
# version. Replaces the older `publish.yml` which raced this workflow
# on the same tag-push trigger (G22-P3 housekeeping).
#
# Scope: npm — the terminal-first CLI/daemon plus its hidden macOS notification
# sender (not a standalone desktop product).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.5.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  build_macos_notifier:
    name: Build native macOS notifier
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build universal notifier app
        run: node scripts/build-macos-notifier.mjs --version "${{ steps.release.outputs.version }}"

      - name: Verify signature, architectures, and adaptive icon
        shell: bash
        run: |
          app="packages/daemon/dist/native/TmuxIdeNotifier.app"
          codesign --verify --deep --strict "$app"
          archs="$(xcrun lipo -archs "$app/Contents/MacOS/tmux-ide-notifier")"
          [[ "$archs" == *arm64* && "$archs" == *x86_64* ]]
          xcrun assetutil --info "$app/Contents/Resources/Assets.car" > "$RUNNER_TEMP/assets.json"
          node -e 'const fs=require("node:fs"); const assets=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const actual=new Set(assets.filter((item)=>item.AssetType==="IconGroup").map((item)=>item.Appearance)); for (const expected of ["NSAppearanceNameAqua", "NSAppearanceNameDarkAqua"]) if (!actual.has(expected)) throw new Error(`missing real ${expected} IconGroup`);' "$RUNNER_TEMP/assets.json"

      - name: Archive app bundle
        run: |
          tar -C packages/daemon/dist/native -czf "$RUNNER_TEMP/tmux-ide-macos-notifier.tar.gz" TmuxIdeNotifier.app

      - name: Upload notifier artifact
        uses: actions/upload-artifact@v4
        with:
          name: tmux-ide-macos-notifier
          path: ${{ runner.temp }}/tmux-ide-macos-notifier.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish_npm:
    name: Publish to npm
    needs: build_macos_notifier
    runs-on: ubuntu-24.04
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download native macOS notifier
        uses: actions/download-artifact@v4
        with:
          name: tmux-ide-macos-notifier
          path: ${{ runner.temp }}/tmux-ide-macos-notifier

      - name: Add native notifier to npm payload
        run: |
          mkdir -p packages/daemon/dist/native
          tar -xzf "$RUNNER_TEMP/tmux-ide-macos-notifier/tmux-ide-macos-notifier.tar.gz" \
            -C packages/daemon/dist/native
          test -x packages/daemon/dist/native/TmuxIdeNotifier.app/Contents/MacOS/tmux-ide-notifier

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Align npm package versions
        run: |
          node -e "const fs=require('node:fs'); for (const p of ['package.json','packages/daemon/package.json']) { const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n'); }" "${{ steps.release.outputs.version }}"

      - name: Run quality checks
        # `pnpm check` runs lint + format + typecheck + unit tests +
        # docs build + pack-check. The integration test relies on a
        # live tmux server that isn't available in CI; rename it to
        # `.skip` so the unit-test stage stays green here without
        # touching the suite's behaviour locally.
        run: |
          mv src/integration.test.ts src/integration.test.ts.skip 2>/dev/null || true
          pnpm run check

      - name: Build daemon
        # Compile packages/daemon/src → packages/daemon/dist so the
        # root `tmux-ide` tarball (files: ["packages/daemon/dist"]) ships
        # the daemon without needing a separate @tmux-ide/daemon publish.
        working-directory: packages/daemon
        run: pnpm exec tsc -p tsconfig.json

      - name: Publish tmux-ide
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Push the just-released version into the Homebrew tap
  # (wavyrai/homebrew-tap → Formula/tmux-ide.rb). The formula's source of
  # truth is packaging/homebrew/Formula/tmux-ide.rb in THIS repo; this job
  # rewrites its url + sha256 to the fresh npm tarball and pushes the result.
  #
  # Gated to a graceful no-op until two one-time setup steps exist:
  #   1. the `wavyrai/homebrew-tap` GitHub repo (empty is fine — this job
  #      creates Formula/tmux-ide.rb on first run), and
  #   2. a `TAP_PUSH_TOKEN` repo secret: a fine-grained PAT with contents
  #      read/write on wavyrai/homebrew-tap.
  bump_tap:
    name: Bump Homebrew tap
    needs: publish_npm
    runs-on: ubuntu-24.04
    env:
      TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gate on tap secret
        id: gate
        run: |
          if [[ -z "${TAP_PUSH_TOKEN}" ]]; then
            echo "TAP_PUSH_TOKEN not set — skipping tap bump (create wavyrai/homebrew-tap and add the secret to enable)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve release version
        if: steps.gate.outputs.enabled == 'true'
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for the npm tarball and compute its sha256
        if: steps.gate.outputs.enabled == 'true'
        id: tarball
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          url="https://registry.npmjs.org/tmux-ide/-/tmux-ide-${version}.tgz"
          # The registry can lag the publish by a little; poll up to 5 minutes.
          for i in $(seq 1 30); do
            if curl -fsSL -o tmux-ide.tgz "$url"; then break; fi
            echo "tarball not visible yet (attempt $i/30) — retrying in 10s"
            sleep 10
          done
          [[ -s tmux-ide.tgz ]] || { echo "npm tarball never appeared: $url" >&2; exit 1; }
          sha="$(sha256sum tmux-ide.tgz | cut -d' ' -f1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update formula and push to the tap
        if: steps.gate.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.release.outputs.version }}"
          url="${{ steps.tarball.outputs.url }}"
          sha="${{ steps.tarball.outputs.sha256 }}"
          if ! git clone --depth 1 "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/wavyrai/homebrew-tap.git" tap; then
            echo "wavyrai/homebrew-tap does not exist (or the token cannot read it) — skipping tap bump."
            exit 0
          fi
          mkdir -p tap/Formula
          sed -E \
            -e "s#^(  url \").*(\")\$#\\1${url}\\2#" \
            -e "s#^(  sha256 \").*(\")\$#\\1${sha}\\2#" \
            packaging/homebrew/Formula/tmux-ide.rb > tap/Formula/tmux-ide.rb
          cd tap
          git add Formula/tmux-ide.rb
          if git diff --cached --quiet; then
            echo "Formula already at v${version} — nothing to push."
            exit 0
          fi
          git -c user.name="tmux-ide release bot" \
              -c user.email="noreply@wavyr.com" \
              commit -m "tmux-ide ${version}"
          git push origin HEAD
