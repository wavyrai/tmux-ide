name: Release

# Single source of truth for npm releases. Triggered by a semver tag
# push (`vX.Y.Z`) or a manual `workflow_dispatch` with an explicit
# version. Replaces the older `publish.yml` which raced this workflow
# on the same tag-push trigger (G22-P3 housekeeping).
#
# Scope: npm only. Desktop / Electron release artifacts are tracked
# under app-electron/ and intentionally not produced here — re-add a
# separate workflow if/when we promote the desktop bundle past
# tier-2 (see docs/goal-22-distribution.md §4).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 2.5.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-24.04
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Align npm package versions
        run: |
          node -e "const fs=require('node:fs'); for (const p of ['package.json','packages/daemon/package.json']) { const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[1]; fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n'); }" "${{ steps.release.outputs.version }}"

      - name: Run quality checks
        # `pnpm check` runs lint + format + typecheck + unit tests +
        # docs build + pack-check. The integration test relies on a
        # live tmux server that isn't available in CI; rename it to
        # `.skip` so the unit-test stage stays green here without
        # touching the suite's behaviour locally.
        run: |
          mv src/integration.test.ts src/integration.test.ts.skip 2>/dev/null || true
          pnpm run check

      - name: Build dashboard
        # The dashboard build also lands inside `@tmux-ide/daemon` via
        # the daemon's `prepack` hook (`build-dashboard.mjs` copies
        # `dashboard/dist/` into `packages/daemon/dist/dashboard/dist/`),
        # so the single build feeds both publishes below.
        run: pnpm --filter @tmux-ide/dashboard build

      - name: Publish @tmux-ide/daemon
        run: pnpm --filter @tmux-ide/daemon publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish tmux-ide
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
